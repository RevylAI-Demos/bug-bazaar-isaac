project:
    name: bug-bazaar
    org_id: 0ac20a4e-5baf-45a8-8e98-263575a09786
build:
    system: Expo
    command: npx --yes eas-cli build --platform ios --profile development-simulator --local --output build/app.tar.gz
    output: build/app.tar.gz
    platforms:
        android:
            command: npx --yes eas-cli build --platform android --profile development --local --output build/app.apk
            output: build/app.apk
            app_id: 16114368-1ef6-4ece-84ae-50a886cf2232
        ios:
            command: npx --yes eas-cli build --platform ios --profile development-simulator --local --output build/app.tar.gz
            output: build/app.tar.gz
            app_id: 58f1da1d-7213-4d52-b1df-cbcd258dcb17
defaults:
    open_browser: true
    timeout: 1800
# Dev mode / hot reload configuration
hotreload:
    default: expo
    providers:
        expo:
            # Metro bundler port (default 8081). Change if port conflicts.
            port: 8081
            # URL scheme from app.json or app.config.js (required for Expo deep linking)
            app_scheme: bug-bazaar
            # Maps platform to build.platforms key for dev build resolution
            platform_keys:
                android: android
                ios: ios
